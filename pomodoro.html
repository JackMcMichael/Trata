<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pomodoro">
<title>Pomodoro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  body { font-family: 'Courier New', monospace; touch-action: manipulation; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  #time-display {
    position: fixed; top: env(safe-area-inset-top, 24px); top: calc(env(safe-area-inset-top, 0px) + 24px);
    left: 0; right: 0; text-align: center;
    font-family: 'Courier New', monospace; font-size: 13px;
    letter-spacing: 4px; color: rgba(255,255,255,0.2); z-index: 10;
  }
  #ui {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: center; gap: 20px;
    padding: 28px 0;
    padding-bottom: calc(28px + env(safe-area-inset-bottom, 0px));
    z-index: 10;
  }
  button {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.7);
    font-family: 'Courier New', monospace;
    font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
    padding: 14px 24px; border-radius: 2px; cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
    min-width: 88px;
  }
  button:active {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.6);
    color: #fff;
  }
  #break-msg {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; z-index: 20;
    background: rgba(0,0,0,0.55);
  }
  #break-msg h1 {
    font-family: 'Courier New', monospace; font-size: 26px;
    letter-spacing: 8px; color: #fff; text-transform: uppercase;
    font-weight: normal; animation: pulse 2.4s ease-in-out infinite;
  }
  #break-msg p {
    margin-top: 18px; font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,0.35);
  }
  @keyframes pulse { 0%,100%{opacity:0.65} 50%{opacity:1} }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="time-display">25:00</div>
<div id="ui">
  <button id="btn-start">START</button>
  <button id="btn-pause" style="display:none">PAUSE</button>
  <button id="btn-reset">RESET</button>
</div>
<div id="break-msg">
  <h1>Break time</h1>
  <p>tap reset to go again</p>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const DURATION = 25 * 60 * 1000;

let W, H, particles = [];
let startTime = null, elapsed = 0;
let running = false, finished = false;

const PSIZE = 4;
const GAP = 1;
const STEP = PSIZE + GAP;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  reset_state();
}

function reset_state() {
  running = false;
  finished = false;
  startTime = null;
  elapsed = 0;
  document.getElementById('break-msg').style.display = 'none';
  document.getElementById('btn-pause').style.display = 'none';
  document.getElementById('btn-start').style.display = 'inline-block';
  document.getElementById('time-display').textContent = '25:00';
  build_particles();
}

function build_particles() {
  particles = [];
  const cols = Math.floor(W / STEP);
  const rows = Math.floor((H * 0.88) / STEP);
  const total = cols * rows;
  const spawnInterval = DURATION / total;
  for (let i = 0; i < total; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    particles.push({
      spawnAt: i * spawnInterval,
      x: col * STEP,
      targetY: row * STEP + STEP,
      curY: -PSIZE,
      falling: false,
      settled: false,
      speed: 2.5 + Math.random() * 4,
      opacity: 0.45 + Math.random() * 0.5,
      hue: 175 + Math.random() * 55,
      sat: 50 + Math.random() * 30,
      lit: 60 + Math.random() * 25,
    });
  }
}

function tick() {
  requestAnimationFrame(tick);
  ctx.clearRect(0, 0, W, H);

  if (running && !finished) {
    elapsed = Date.now() - startTime;
    if (elapsed >= DURATION) {
      elapsed = DURATION;
      finished = true;
      running = false;
      document.getElementById('break-msg').style.display = 'flex';
      document.getElementById('btn-start').style.display = 'none';
      document.getElementById('btn-pause').style.display = 'none';
    }
  }

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.spawnAt > elapsed) continue;
    if (!p.falling && !p.settled) { p.falling = true; p.curY = -PSIZE; }
    if (p.falling) {
      p.curY += p.speed;
      if (p.curY >= p.targetY) { p.curY = p.targetY; p.falling = false; p.settled = true; }
    }
    ctx.fillStyle = p.settled
      ? `hsla(${p.hue},${p.sat}%,${p.lit}%,${p.opacity})`
      : `hsla(${p.hue},80%,90%,${p.opacity * 0.55})`;
    ctx.fillRect(p.x, p.curY, PSIZE, PSIZE);
  }

  const rem = Math.max(0, DURATION - elapsed);
  const m = Math.floor(rem / 60000);
  const s = Math.floor((rem % 60000) / 1000);
  document.getElementById('time-display').textContent =
    String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

document.getElementById('btn-start').addEventListener('click', () => {
  if (finished || running) return;
  startTime = Date.now() - elapsed;
  running = true;
  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-pause').style.display = 'inline-block';
});

document.getElementById('btn-pause').addEventListener('click', () => {
  if (!running) return;
  elapsed = Date.now() - startTime;
  running = false;
  document.getElementById('btn-pause').style.display = 'none';
  document.getElementById('btn-start').style.display = 'inline-block';
});

document.getElementById('btn-reset').addEventListener('click', reset_state);

window.addEventListener('resize', resize);
resize();
tick();
</script>
</body>
</html>
